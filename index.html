        var box = getAnnotationBounds(annotation);
        return {
          x: box.x + box.width / 2,
          y: box.y + box.height / 2
        };
      }

      function pointsToRect(start, end) {
        var x1 = start ? start.x : 0;
        var y1 = start ? start.y : 0;
        var x2 = end ? end.x : x1;
        var y2 = end ? end.y : y1;
        return {
          x: Math.min(x1, x2),
          y: Math.min(y1, y2),
          width: Math.abs(x2 - x1),
          height: Math.abs(y2 - y1)
        };
      }

      function pointsBounds(points) {
        if (!points.length) {
          return { x: 0, y: 0, width: 0, height: 0 };
        }
        var minX = points[0].x;
        var maxX = points[0].x;
        var minY = points[0].y;
        var maxY = points[0].y;
        points.forEach(function (point) {
          minX = Math.min(minX, point.x);
          maxX = Math.max(maxX, point.x);
          minY = Math.min(minY, point.y);
          maxY = Math.max(maxY, point.y);
        });
        return {
          x: minX,
          y: minY,
          width: Math.max(1, maxX - minX),
          height: Math.max(1, maxY - minY)
        };
      }

      function distance(a, b) {
        var dx = (a.x || 0) - (b.x || 0);
        var dy = (a.y || 0) - (b.y || 0);
        return Math.sqrt(dx * dx + dy * dy);
      }

      function getPathLength(points) {
        var total = 0;
        for (var i = 1; i < points.length; i += 1) {
          total += distance(points[i - 1], points[i]);
        }
        return total;
      }

      function roundedRect(target, x, y, width, height, radius) {
        var r = Math.min(radius, width / 2, height / 2);
        target.beginPath();
        target.moveTo(x + r, y);
        target.lineTo(x + width - r, y);
        target.quadraticCurveTo(x + width, y, x + width, y + r);
        target.lineTo(x + width, y + height - r);
        target.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        target.lineTo(x + r, y + height);
        target.quadraticCurveTo(x, y + height, x, y + height - r);
        target.lineTo(x, y + r);
        target.quadraticCurveTo(x, y, x + r, y);
        target.closePath();
      }

      function wrapText(target, text, maxWidth) {
        var paragraphs = String(text || "").split(/\r?\n/);
        var lines = [];
        paragraphs.forEach(function (paragraph) {
          if (!paragraph.trim()) {
            lines.push("");
            return;
          }
          var current = "";
          Array.from(paragraph).forEach(function (char) {
            var test = current + char;
            if (current && target.measureText(test).width > maxWidth) {
              lines.push(current);
              current = char.trimStart();
            } else {
              current = test;
            }
          });
          if (current) {
            lines.push(current);
          }
        });
        return lines.slice(0, 12);
      }

      function cleanInstruction(value) {
        return String(value || "").replace(/\s+$/g, "").trim();
      }

      function hexToRgba(hex, alpha) {
        var normalized = String(hex || "#000000").replace("#", "");
        if (normalized.length === 3) {
          normalized = normalized.split("").map(function (char) { return char + char; }).join("");
        }
        var number = parseInt(normalized, 16);
        var red = (number >> 16) & 255;
        var green = (number >> 8) & 255;
        var blue = number & 255;
        return "rgba(" + red + ", " + green + ", " + blue + ", " + alpha + ")";
      }

      function padNumber(value) {
        return String(value).padStart(2, "0");
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes)) {
          return "";
        }
        if (bytes < 1024) {
          return bytes + " B";
        }
        if (bytes < 1024 * 1024) {
          return (bytes / 1024).toFixed(1) + " KB";
        }
        return (bytes / 1024 / 1024).toFixed(2) + " MB";
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("is-visible");
        window.clearTimeout(state.toastTimer);
        state.toastTimer = window.setTimeout(function () {
          toast.classList.remove("is-visible");
        }, 2200);
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function cssEscape(value) {
        if (window.CSS && CSS.escape) {
          return CSS.escape(value);
        }
        return String(value).replace(/["\\]/g, "\\$&");
      }
    }());
  </script>
